<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">

  <style>
    .actor { fill:#e8f4ff; stroke:#000; stroke-width:1.5; }
    .object { fill:#f5f5f5; stroke:#000; stroke-width:1.5; }
    .line { stroke:#000; stroke-width:1.5; stroke-dasharray:6 4; }
    .msg { stroke:#000; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
    .text { font-family:Arial,sans-serif; font-size:14px; }
    .title { font-family:Arial,sans-serif; font-size:20px; font-weight:bold; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="black"></path>
    </marker>
  </defs>

  <!-- Název -->
  <text x="400" y="35" class="title">
    Sekvenční diagram – Symbolická adopce lachtana
  </text>

  <!-- Objekty -->
  <rect x="50" y="60" width="120" height="40" class="actor"></rect>
  <text x="85" y="85" class="text">Uživatel</text>

  <rect x="300" y="60" width="120" height="40" class="object"></rect>
  <text x="320" y="85" class="text">Web aplikace</text>

  <rect x="550" y="60" width="120" height="40" class="object"></rect>
  <text x="585" y="85" class="text">Adopce</text>

  <rect x="800" y="60" width="120" height="40" class="object"></rect>
  <text x="825" y="85" class="text">Lachtan</text>

  <rect x="1050" y="60" width="120" height="40" class="object"></rect>
  <text x="1085" y="85" class="text">Databáze</text>

  <!-- Lifelines -->
  <line x1="110" y1="100" x2="110" y2="650" class="line"></line>
  <line x1="360" y1="100" x2="360" y2="650" class="line"></line>
  <line x1="610" y1="100" x2="610" y2="650" class="line"></line>
  <line x1="860" y1="100" x2="860" y2="650" class="line"></line>
  <line x1="1110" y1="100" x2="1110" y2="650" class="line"></line>

  <!-- Zprávy -->

  <!-- 1 -->
  <line x1="110" y1="140" x2="360" y2="140" class="msg"></line>
  <text x="160" y="130" class="text">
    Přihlášení
  </text>

  <!-- 2 -->
  <line x1="360" y1="190" x2="1110" y2="190" class="msg"></line>
  <text x="560" y="180" class="text">
    Ověření uživatele
  </text>

  <!-- 3 -->
  <line x1="1110" y1="240" x2="360" y2="240" class="msg"></line>
  <text x="720" y="230" class="text">
    Potvrzení přihlášení
  </text>

  <!-- 4 -->
  <line x1="110" y1="290" x2="360" y2="290" class="msg"></line>
  <text x="140" y="280" class="text">
    Vybrat lachtana
  </text>

  <!-- 5 -->
  <line x1="360" y1="340" x2="860" y2="340" class="msg"></line>
  <text x="520" y="330" class="text">
    Načíst detail lachtana
  </text>

  <!-- 6 -->
  <line x1="860" y1="390" x2="1110" y2="390" class="msg"></line>
  <text x="910" y="380" class="text">
    Načíst data
  </text>

  <!-- 7 -->
  <line x1="1110" y1="440" x2="860" y2="440" class="msg"></line>
  <text x="920" y="430" class="text">
    Data lachtana
  </text>

  <!-- 8 -->
  <line x1="360" y1="490" x2="610" y2="490" class="msg"></line>
  <text x="430" y="480" class="text">
    Vytvořit adopci
  </text>

  <!-- 9 -->
  <line x1="610" y1="540" x2="1110" y2="540" class="msg"></line>
  <text x="760" y="530" class="text">
    Uložit adopci
  </text>

  <!-- 10 -->
  <line x1="1110" y1="590" x2="610" y2="590" class="msg"></line>
  <text x="810" y="580" class="text">
    Potvrzení uložení
  </text>

  <!-- 11 -->
  <line x1="610" y1="630" x2="110" y2="630" class="msg"></line>
  <text x="300" y="620" class="text">
    Adopce úspěšně vytvořena
  </text>

</svg>