<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1200">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="black"></path>
    </marker>
  </defs>

  <!-- START -->
  <circle cx="500" cy="40" r="15" fill="black"></circle>

  <!-- Aktivita -->
  <rect x="380" y="80" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="110" text-anchor="middle">Otevřít webovou aplikaci</text>

  <rect x="380" y="170" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="200" text-anchor="middle">Zobrazit seznam lachtanů</text>

  <rect x="380" y="260" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="290" text-anchor="middle">Vybrat lachtana</text>

  <rect x="380" y="350" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="380" text-anchor="middle">Zobrazit detail lachtana</text>

  <rect x="380" y="440" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="470" text-anchor="middle">Kliknout na Adoptovat</text>

  <!-- Rozhodnutí -->
  <polygon points="500,540 570,600 500,660 430,600" fill="white" stroke="black"></polygon>
  <text x="500" y="605" text-anchor="middle">Přihlášen?</text>

  <!-- Přihlášení -->
  <rect x="700" y="575" width="220" height="50" fill="white" stroke="black"></rect>
  <text x="810" y="605" text-anchor="middle">Zadat údaje k přihlášení</text>

  <rect x="700" y="670" width="220" height="50" fill="white" stroke="black"></rect>
  <text x="810" y="700" text-anchor="middle">Ověřit účet</text>

  <!-- Merge -->
  <polygon points="500,760 550,800 500,840 450,800" fill="white" stroke="black"></polygon>

  <!-- Pokračování -->
  <rect x="380" y="890" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="920" text-anchor="middle">Vyplnit údaje adopce</text>

  <rect x="380" y="980" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="1010" text-anchor="middle">Potvrdit adopci</text>

  <rect x="380" y="1070" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="1100" text-anchor="middle">Uložit adopci do databáze</text>

  <rect x="380" y="1160" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="1190" text-anchor="middle">Aktualizovat historii adopcí</text>

  <rect x="380" y="1250" width="240" height="50" fill="white" stroke="black"></rect>
  <text x="500" y="1280" text-anchor="middle">Zobrazit potvrzení</text>

  <!-- END -->
  <circle cx="500" cy="1360" r="18" fill="white" stroke="black" stroke-width="3"></circle>
  <circle cx="500" cy="1360" r="10" fill="black"></circle>

  <!-- Spojnice -->
  <line x1="500" y1="55" x2="500" y2="80" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="500" y1="130" x2="500" y2="170" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="500" y1="220" x2="500" y2="260" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="500" y1="310" x2="500" y2="350" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="500" y1="400" x2="500" y2="440" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="500" y1="490" x2="500" y2="540" stroke="black" marker-end="url(#arrow)"></line>

  <!-- Ano -->
  <line x1="500" y1="660" x2="500" y2="760" stroke="black" marker-end="url(#arrow)"></line>
  <text x="515" y="715">Ano</text>

  <!-- Ne -->
  <line x1="570" y1="600" x2="700" y2="600" stroke="black" marker-end="url(#arrow)"></line>
  <text x="620" y="585">Ne</text>

  <line x1="810" y1="625" x2="810" y2="670" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="810" y1="720" x2="810" y2="800" stroke="black"></line>
  <line x1="810" y1="800" x2="550" y2="800" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="500" y1="840" x2="500" y2="890" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="500" y1="940" x2="500" y2="980" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="500" y1="1030" x2="500" y2="1070" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="500" y1="1120" x2="500" y2="1160" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="500" y1="1210" x2="500" y2="1250" stroke="black" marker-end="url(#arrow)"></line>

  <line x1="500" y1="1300" x2="500" y2="1342" stroke="black" marker-end="url(#arrow)"></line>

</svg>