<svg width="1300" height="750" xmlns="http://www.w3.org/2000/svg">

<style>
.system { fill:none; stroke:black; stroke-width:2; }
.usecase { fill:white; stroke:black; stroke-width:1.5; }
.assoc { stroke:black; stroke-width:1.5; fill:none; }
.include { stroke:black; stroke-width:1.2; stroke-dasharray:6,4; fill:none; }
.label { font-family:Arial; font-size:13px; text-anchor:middle; dominant-baseline:middle; }
.title { font-family:Arial; font-size:16px; font-weight:bold; text-anchor:middle; }
.actor { font-family:Arial; font-size:14px; font-weight:bold; text-anchor:middle; }
</style>

<!-- System boundary -->
<rect x="220" y="20" width="860" height="680" class="system"></rect>
<text x="650" y="45" class="title">Informační systém adopce lachtanů</text>

<!-- USER -->
<circle cx="80" cy="220" r="20" stroke="black" fill="none"></circle>
<line x1="80" y1="240" x2="80" y2="290" class="assoc"></line>
<line x1="55" y1="260" x2="105" y2="260" class="assoc"></line>
<line x1="80" y1="290" x2="60" y2="320" class="assoc"></line>
<line x1="80" y1="290" x2="100" y2="320" class="assoc"></line>
<text x="80" y="350" class="actor">Uživatel</text>

<!-- ADMIN -->
<circle cx="1220" cy="220" r="20" stroke="black" fill="none"></circle>
<line x1="1220" y1="240" x2="1220" y2="290" class="assoc"></line>
<line x1="1195" y1="260" x2="1245" y2="260" class="assoc"></line>
<line x1="1220" y1="290" x2="1200" y2="320" class="assoc"></line>
<line x1="1220" y1="290" x2="1240" y2="320" class="assoc"></line>
<text x="1220" y="350" class="actor">Administrátor</text>

<!-- USER USE CASES -->
<ellipse cx="400" cy="120" rx="120" ry="25" class="usecase"></ellipse>
<text x="400" y="120" class="label">Registrace</text>

<ellipse cx="400" cy="250" rx="120" ry="25" class="usecase"></ellipse>
<text x="400" y="250" class="label">Správa profilu</text>

<!-- POSUNUTO NAHORU -->
<ellipse cx="400" cy="350" rx="140" ry="25" class="usecase"></ellipse>
<text x="400" y="350" class="label">Prohlížení lachtanů</text>

<ellipse cx="400" cy="510" rx="140" ry="25" class="usecase"></ellipse>
<text x="400" y="510" class="label">Adoptovat lachtana</text>

<ellipse cx="400" cy="640" rx="140" ry="25" class="usecase"></ellipse>
<text x="400" y="640" class="label">Nákup produktů</text>

<!-- LOGIN -->
<ellipse cx="650" cy="380" rx="120" ry="25" class="usecase"></ellipse>
<text x="650" y="380" class="label">Přihlášení</text>

<!-- ADMIN USE CASES -->
<ellipse cx="900" cy="250" rx="130" ry="25" class="usecase"></ellipse>
<text x="900" y="250" class="label">Správa lachtanů</text>

<!-- POSUNUTO DOLŮ -->
<ellipse cx="900" cy="430" rx="130" ry="25" class="usecase"></ellipse>
<text x="900" y="430" class="label">Správa adopcí</text>

<ellipse cx="900" cy="510" rx="130" ry="25" class="usecase"></ellipse>
<text x="900" y="510" class="label">Správa produktů</text>

<!-- User associations -->
<line x1="100" y1="210" x2="280" y2="120" class="assoc"></line>
<line x1="100" y1="240" x2="280" y2="250" class="assoc"></line>
<line x1="100" y1="270" x2="260" y2="350" class="assoc"></line>
<line x1="100" y1="290" x2="260" y2="510" class="assoc"></line>
<line x1="100" y1="310" x2="260" y2="640" class="assoc"></line>

<!-- Admin associations -->
<line x1="1200" y1="240" x2="1030" y2="250" class="assoc"></line>
<line x1="1200" y1="270" x2="1030" y2="430" class="assoc"></line>
<line x1="1200" y1="300" x2="1030" y2="510" class="assoc"></line>

<!-- Include relations -->
<line x1="520" y1="270" x2="580" y2="360" class="include"></line>
<text x="565" y="305" font-size="12">&lt;&lt;include&gt;&gt;</text>

<line x1="540" y1="500" x2="580" y2="400" class="include"></line>
<text x="560" y="455" font-size="12">&lt;&lt;include&gt;&gt;</text>

<line x1="540" y1="625" x2="600" y2="405" class="include"></line>
<text x="575" y="530" font-size="12">&lt;&lt;include&gt;&gt;</text>

<line x1="780" y1="430" x2="720" y2="400" class="include"></line>
<text x="760" y="405" font-size="12">&lt;&lt;include&gt;&gt;</text>

<line x1="780" y1="510" x2="720" y2="400" class="include"></line>
<text x="760" y="455" font-size="12">&lt;&lt;include&gt;&gt;</text>

</svg>